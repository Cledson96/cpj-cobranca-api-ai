server {
    listen 80;
    server_name api.preambulo.cledson.com.br;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 10M;

    # Uncomment after running: certbot --nginx -d api.preambulo.cledson.com.br
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/api.preambulo.cledson.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.preambulo.cledson.com.br/privkey.pem;
}
